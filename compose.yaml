services:
  app:
    build: .
    container_name: ep3-app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - /opt/ep3/secrets/.htpasswd:/run/secrets/.htpasswd:ro
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: ep3-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ep3
      MARIADB_USER: ep3
      MARIADB_PASSWORD: ep3
    volumes:
      - ep3_db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ep3-phpmyadmin
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ep3
      PMA_PASSWORD: ep3
    depends_on:
      - db

  mailpit:
    image: axllent/mailpit:latest
    container_name: ep3-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  ep3_db_data:
